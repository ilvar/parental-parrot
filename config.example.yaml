ui_password: "secret123"

# Router config (required for block_method = "router" or detect_method = "router_conntrack")
router:
  ip: "192.168.1.1"
  ssh_user: "root"
  ssh_key: "/home/you/.ssh/id_ed25519"
  # ssh_password: "password"  # alternative to ssh_key

schedule:
  all: 120
  allowed_hours:
    start: "08:00"
    end: "21:00"

devices:
  - name: "Kids PC"
    ip: "192.168.1.100"
    ssh_user: admin
    ssh_password: password
    # ssh_key: "/home/you/.ssh/id_ed25519"  # alternative to password
    os: linux
    schedule:
      all: 60
      allowed_hours:
        start: "17:00"
        end: "19:00"
  - name: "Kid's Phone"
    ip: "192.168.1.150"
    mac: "AA:BB:CC:DD:EE:FF"
    block_method: router
    detect_method: router_conntrack
